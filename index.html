<!doctype html>
<html lang="zh-CN" prefix="og: https://ogp.me/ns#">
  <head>
    <script>
      ;(() => {
        try {
          const theme = localStorage.getItem('app_theme') === 'light' ? 'light' : 'dark'
          document.documentElement.dataset.theme = theme
        } catch {
          document.documentElement.dataset.theme = 'dark'
        }
      })()
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />

    <!-- Open Graph：供支持 OGP 的聊天软件、社交平台和搜索服务读取 -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="zh_CN" />
    <meta property="og:site_name" content="织夜工具箱" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:alt" content="织夜工具箱图标" />

    <meta name="twitter:card" content="summary" />
    <link
      href="https://jsd.onmicrosoft.cn/npm/cn-fontsource-source-han-sans-sc-vf@1.0.10/font.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
      media="print"
      onload="this.media = 'all'"
    />

    <meta name="theme-color" content="#1a1b20" />
    <link rel="apple-touch-icon" href="/images/icons/icon-192px.png" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
  <style>
    body {
      margin: 0;
      padding: 0;
    }
  </style>
</html>
